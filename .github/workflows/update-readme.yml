name: Update README (AI)

# Manual button in the Actions tab. Regenerates README.md from .github/readme-brief.md
# using the OpenAI API, then commits it if anything changed.
on:
  workflow_dispatch:
    inputs:
      model:
        description: "OpenAI model"
        required: true
        default: "gpt-4o"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate README with OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEL: ${{ inputs.model }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Missing OPENAI_API_KEY secret. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

          PROMPT="$(cat .github/readme-brief.md)"

          # Build the request body safely (jq escapes the prompt for us).
          jq -n --arg model "$MODEL" --arg prompt "$PROMPT" '{
            model: $model,
            temperature: 0.5,
            messages: [
              { role: "system", content: "You are a technical writer. Output only the final README.md as raw GitHub-flavored markdown. Do not wrap it in code fences." },
              { role: "user", content: $prompt }
            ]
          }' > request.json

          HTTP=$(curl -sS -o response.json -w "%{http_code}" https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @request.json)

          if [ "$HTTP" != "200" ]; then
            echo "::error::OpenAI API returned HTTP $HTTP"
            cat response.json
            exit 1
          fi

          jq -r '.choices[0].message.content' response.json > README.new

          # Strip stray ``` fences the model sometimes adds, just in case.
          sed -i '1{/^```/d}; ${/^```$/d}' README.new

          if [ ! -s README.new ]; then
            echo "::error::Model returned empty content"; exit 1
          fi
          mv README.new README.md

      - name: Commit if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "README unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Auto-update README via OpenAI (${{ inputs.model }})"
          git push
