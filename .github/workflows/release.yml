name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2)"
        required: true
        default: "v1.2"
      title:
        description: "Release title"
        required: true
        default: "v1.2"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build
        run: |
          for attempt in 1 2 3; do
            if ./gradlew build --no-daemon; then
              exit 0
            fi
            echo "Build attempt $attempt failed; retrying in 20s..."
            sleep 20
          done
          exit 1

      - name: Locate jar
        id: jar
        run: |
          JAR=$(ls build/libs/*.jar | grep -v -e '-sources' -e '-dev' | head -n 1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "Built $JAR"

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          Multi-watch update + bug-fix pass.

          ### Multiple Discords & multiple servers
          - Add any number of watches — each with its own name, Discord token (bot or user), channel, keywords, and target server
          - Notifications always name the server (and watch) they came from, so two watches can't send you rushing to the wrong server
          - Chat join links carry their event's server; `/ewjoin` joins the latest event, `/ewjoin <address>` joins a specific one
          - Watch switcher in settings (`<` `1/2` `>` plus `+`/`-`) and aggregate status (e.g. `2/2 connected`)
          - Old configs migrate automatically

          ### Fixes
          - First message posted in an empty channel was never scanned (user-token mode)
          - Embed fields/author/footer are now scanned, so event-bot embeds match reliably
          - Gateway: no endless heartbeat warnings after fatal closes, no duplicate-reconnect socket races, real backoff on rate limits
          - Poller honors Discord's Retry-After and reports non-numeric channel IDs clearly
          - Overlapping auto-connect attempts no longer cancel each other
          - Pasted tokens are trimmed; a blank target server can't be saved
          - Fixed a resource leak in custom .wav playback

          Requires Minecraft 1.21.11, Fabric Loader 0.19+, Fabric API, Java 21.
          EOF

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
          TITLE: ${{ inputs.title || github.ref_name }}
        run: |
          gh release create "$TAG" "${{ steps.jar.outputs.path }}" \
            --target "${{ github.sha }}" \
            --title "$TITLE" \
            --notes-file release-notes.md
