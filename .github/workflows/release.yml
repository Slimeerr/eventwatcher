name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2)"
        required: true
        default: "v1.2"
      title:
        description: "Release title"
        required: true
        default: "v1.2"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build
        run: |
          for attempt in 1 2 3; do
            if ./gradlew build --no-daemon; then
              exit 0
            fi
            echo "Build attempt $attempt failed; retrying in 20s..."
            sleep 20
          done
          exit 1

      - name: Locate jar
        id: jar
        run: |
          JAR=$(ls build/libs/*.jar | grep -v -e '-sources' -e '-dev' | head -n 1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "Built $JAR"

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          v1.5 — the big one. Built to catch events faster and never miss one.

          ### Multiple servers, each its own watch
          - Add any number of target servers, each with its own Discord channel(s), keywords, and Notify/Auto-Connect mode
          - A message routes to the server whose channel + keywords it matches; notifications name the server it came from
          - Old configs migrate automatically

          ### Sharper matching
          - Whole-word matching so `event` won't fire on "prevent"
          - Negative keywords: prefix with `!` to ignore (e.g. `!ended`)
          - Per-server cooldown so a chatty channel can't spam-join you

          ### Faster, more reliable joins
          - Retry-until-joined: keep hammering a full/queued event server until you get in
          - Notification queue: multiple events can be pending at once, each its own join button
          - Reconnect-storm guard + rate-limit backoff so you stay connected and don't get throttled

          ### Nice touches
          - The join button shows who posted, with their Discord avatar
          - Test Alert button, persistent "events caught" counter, keyword-collision warning, hover tooltips
          - A galaxy gradient theme with an animated starfield across every screen

          ### Fixes
          - Resource leak in custom .wav playback

          Requires Minecraft 1.21.11, Fabric Loader 0.19+, Fabric API, Java 21.
          EOF

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
          TITLE: ${{ inputs.title || github.ref_name }}
        run: |
          gh release create "$TAG" "${{ steps.jar.outputs.path }}" \
            --target "${{ github.sha }}" \
            --title "$TITLE" \
            --notes-file release-notes.md
